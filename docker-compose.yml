version: "3.9"

services:
  smartrag:
    build: .
    ports:
      - "${SMARTRAG_PORT:-8000}:8000"
    volumes:
      - smartrag-data:/data/knowledge
    env_file:
      - .env
    environment:
      - SMARTRAG_KNOWLEDGE_DIR=/data/knowledge
      - SMARTRAG_PORT=8000
      - SMARTRAG_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  smartrag-data:
